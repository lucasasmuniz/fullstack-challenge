services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      # *_test: bancos isolados para os testes e2e (não poluem games/wallets de dev/demo)
      POSTGRES_EXTRA_DATABASES: games,wallets,games_test,wallets_test
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # LocalStack (AWS SQS — substitui o RabbitMQ)
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEBUG: "0"
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./docker/localstack/init/ready.d:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Valkey (cache + pub/sub do WebSocket + estado do round)
  # ---------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak (Identity Provider)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kong (API Gateway — DB-less / declarative)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9.1
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./docker/kong:/kong:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Games Service
  # ---------------------------------------------------------------------------
  games:
    build:
      context: .
      dockerfile: services/games/Dockerfile
    # Sem `ports` publicadas no host: o serviço de aplicação só é acessível **via Kong** (8000) —
    # auth e rate-limiting não podem ser contornados batendo direto na porta do container. `expose`
    # é apenas documentação; na rede do compose Kong→games:4001 e Prometheus→games:9464 funcionam
    # sem publicar no host.
    expose:
      - "4001"
      - "9464" # /metrics (Prometheus scrape — B4, via rede interna)
    environment:
      PORT: 4001
      METRICS_PORT: 9464
      DATABASE_URL: postgresql://admin:admin@postgres:5432/games
      KEYCLOAK_ISSUER: http://localhost:8080/realms/crash-game
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/crash-game/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_ID: crash-game-client
      AWS_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_INBOX_QUEUE_URL: http://localstack:4566/000000000000/game-inbox
      SQS_OUTBOUND_QUEUE_URL: http://localstack:4566/000000000000/wallet-inbox
      VALKEY_URL: redis://valkey:6379
      # Engine / curva (Etapa 4) — tunáveis (defaults no zod cobrem o restante)
      CRASH_GROWTH_RATE: "0.06"
      BETTING_WINDOW_MS: "8000"
      TICK_INTERVAL_MS: "250"
      INTER_ROUND_DELAY_MS: "3000"
      # Tamanho da cadeia pré-gerada. 1000 = dev/teste (boot/recriação rápidos);
      # aumente (ex.: 100000) na entrega para um horizonte de pré-commitment maior.
      SEED_CHAIN_LENGTH: "1000"
      SCHEDULER_LEASE_TTL_MS: "10000"
      SCHEDULER_ENABLED: "true"
      # Beacon drand (anti-pré-computação); offline → fallback CSPRNG (sobe normal)
      BEACON_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      valkey:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      # A imagem (base Bun) não tem curl; usa o próprio Bun para sondar o /health.
      test: ["CMD-SHELL", "bun -e 'fetch(\"http://localhost:4001/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Wallets Service
  # ---------------------------------------------------------------------------
  wallets:
    build:
      context: .
      dockerfile: services/wallets/Dockerfile
    # Sem `ports` publicadas no host: o serviço de aplicação só é acessível **via Kong** (8000) —
    # auth e rate-limiting não podem ser contornados batendo direto na porta do container. `expose`
    # é apenas documentação; na rede do compose Kong→wallets:4002 e Prometheus→wallets:9465
    # funcionam sem publicar no host.
    expose:
      - "4002"
      - "9465" # /metrics (Prometheus scrape — B4, via rede interna)
    environment:
      PORT: 4002
      METRICS_PORT: 9465
      DATABASE_URL: postgresql://admin:admin@postgres:5432/wallets
      KEYCLOAK_ISSUER: http://localhost:8080/realms/crash-game
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/crash-game/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_ID: crash-game-client
      AWS_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_INBOX_QUEUE_URL: http://localstack:4566/000000000000/wallet-inbox
      SQS_OUTBOUND_QUEUE_URL: http://localstack:4566/000000000000/game-inbox
      VALKEY_URL: redis://valkey:6379
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      valkey:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      # A imagem (base Bun) não tem curl; usa o próprio Bun para sondar o /health.
      test: ["CMD-SHELL", "bun -e 'fetch(\"http://localhost:4002/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Prometheus (B4 — coleta as métricas /metrics dos serviços)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - games
      - wallets

  # ---------------------------------------------------------------------------
  # Grafana (B4 — dashboards de RTP/volume/latência; datasource + dashboard provisionados)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Frontend (Next.js) — build a partir da raiz do monorepo (resolve @crash-game/*).
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - kong

volumes:
  postgres_data:
